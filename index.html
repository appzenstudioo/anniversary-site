<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary ❤️</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  color:white;
}

.app{
  width:100%;
  max-width:420px;
  height:100vh;
  position:relative;
}

/* screens */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}
.active{display:block;}

/* image container */
.bg{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
}

.bg img{
  width:100%;
  height:100%;
  object-fit:contain; /* 🔥 no cutting */
}

/* bottom overlay */
.overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  background:rgba(0,0,0,0.65);
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* button */
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:gold;
  margin-top:10px;
}

h1,h2,p{
  margin:5px 0;
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active" style="display:flex;justify-content:center;align-items:center;flex-direction:column;">
  <h1>Welcome ❤️</h1>
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="main" class="screen">
  <div class="bg">
    <img id="mainImg">
  </div>

  <div class="overlay">
    <h2>Happy Anniversary 💖</h2>
    <p id="timer"></p>
    <button onclick="openTimeline()">Timeline 👶</button>
  </div>
</div>

<!-- TIMELINE -->
<div id="timeline" class="screen">
  <div class="bg">
    <img id="timelineImg">
  </div>

  <div class="overlay">
    <h2>Our Family 💖</h2>
    <button onclick="back()">Back</button>
  </div>
</div>

</div>

<script>

const startDate = new Date("2016-04-21T00:00:00+05:30");

let slideIndex = 0;
let kidIndex = 0;
let timer;

const slides = ["w1.jpeg","w2.jpeg","w3.jpeg"];
const kids = ["d1.jpeg","d2.jpeg","s1.jpeg"];

/* START */
function start(){
  document.getElementById("start").classList.remove("active");
  document.getElementById("main").classList.add("active");

  showSlides();
  startTimer();
}

/* MAIN SLIDES */
function showSlides(){
  const img = document.getElementById("mainImg");

  img.src = "images/" + slides[slideIndex];

  slideIndex++;

  if(slideIndex < slides.length){
    setTimeout(showSlides, 4000);
  }
}

/* TIMER */
function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    let diff = new Date() - startDate;

    let s = Math.floor(diff/1000);
    let m = Math.floor(s/60);
    let h = Math.floor(m/60);
    let d = Math.floor(h/24);
    let w = Math.floor(d/7);
    let mo = Math.floor(d/30);
    let y = Math.floor(d/365);

    document.getElementById("timer").innerHTML =
      `${y} Years | ${mo%12} Months | ${w%4} Weeks<br>
       ${d%7} Days | ${h%24} H | ${m%60} M | ${s%60} S`;
  },1000);
}

/* OPEN TIMELINE */
function openTimeline(){
  document.getElementById("main").classList.remove("active");
  document.getElementById("timeline").classList.add("active");

  kidIndex = 0;
  showKids();
}

/* KIDS SLIDES */
function showKids(){
  const img = document.getElementById("timelineImg");

  img.src = "images/" + kids[kidIndex];

  kidIndex++;

  if(kidIndex < kids.length){
    setTimeout(showKids, 3000);
  }
}

/* BACK */
function back(){
  document.getElementById("timeline").classList.remove("active");
  document.getElementById("main").classList.add("active");
}

</script>

</body>
</html>
