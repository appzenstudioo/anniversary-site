<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  font-family:sans-serif;
  overflow:hidden;
  color:white;
}

.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  position:relative;
}

.screen{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
}
.active{
  opacity:1;
  pointer-events:auto;
}

.main-img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transform:scale(1);
  transition:opacity 1s ease, transform 6s ease;
}
.show{
  opacity:1;
  transform:scale(1.08);
}

.bg-blur{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(25px) brightness(0.6);
  transform:scale(1.1);
}

.overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:12px;
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff4d6d;
  color:white;
}

.progress{
  position:absolute;
  top:0;
  height:4px;
  background:white;
  width:0%;
}

#msgBox{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  background:rgba(0,0,0,0.9);
  padding:25px;
  border-radius:12px;
  text-align:center;
  opacity:0;
  transition:0.4s;
}
#msgBox.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.glow{
  animation:glow 2.5s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 5px #fff;}
  to{text-shadow:0 0 25px #ff4d6d;}
}
</style>
</head>

<body>

<div class="app">

<div id="progress" class="progress"></div>

<!-- START -->
<div id="start" class="screen active" style="display:flex;justify-content:center;align-items:center;flex-direction:column;">
<h1>❤️ Welcome ❤️</h1>
<p id="loadingText">Tap to Begin</p>
</div>

<!-- MAIN -->
<div id="main" class="screen">
<div id="blur" class="bg-blur"></div>
<img id="img" class="main-img">

<div class="overlay">
<h2 id="quote"></h2>
<div id="counter" style="font-size:12px;opacity:0.7;"></div>
<button onclick="goTimeline()">Our Journey 🚗</button>
</div>
</div>

<!-- POPUP -->
<div id="msgBox">
<p>
✨ This is just the beginning…<br><br>
👉 Tap <b>Our Journey 🚗</b><br>
to feel every moment again<br><br>
🎁 Something beautiful awaits at the end ❤️
</p>
</div>

<!-- TIMELINE -->
<div id="timeline" class="screen">
<div id="tBlur" class="bg-blur"></div>
<img id="tImg" class="main-img">

<div class="overlay">
<div id="year"></div>
<button onclick="nextYear()">Next ➡️</button>
</div>
</div>

<!-- FINAL -->
<div id="final" class="screen">
<div class="bg-blur" style="background-image:url('images/w9.jpeg')"></div>
<img src="images/w9.jpeg" class="main-img show">

<div class="overlay">
<h2 class="glow">❤️ Happy 10th Anniversary ❤️</h2>
<p id="finalText"></p>
<button onclick="location.reload()">Replay 🔁</button>
</div>
</div>

</div>

<script>

const slides=[
{img:"w1.jpeg",text:"A journey that began with a single promise ❤️"},
{img:"w2.jpeg",text:"Two hearts… choosing each other every day 💖"},
{img:"w3.jpeg",text:"Not perfect… but perfect for each other ✨"},
{img:"w4.jpeg",text:"Smiles, fights, memories… all worth it 😊"},
{img:"w5.jpeg",text:"Growing together, stronger every day 🌸"},
{img:"w6.jpeg",text:"Standing side by side through everything 🤝"},
{img:"w7.jpeg",text:"Love that never faded… only grew 💞"},
{img:"w8.jpeg",text:"Years passed… but hearts stayed the same ❤️"},
{img:"w9.jpeg",text:"And forever still continues… 💫"}
];

/* 🔥 EMOTIONAL TIMELINE */
const timeline=[
{
year:"2016 💍",
img:"w1.jpeg",
text:"The day two souls promised to walk together…<br>through every joy, every storm… forever ❤️"
},
{
year:"2020 👶",
img:"d1.jpeg",
text:"A tiny heartbeat entered their world…<br><b>Kundana Priya</b> 💖<br>turning love into a new life"
},
{
year:"2023 👶",
img:"d2.jpeg",
text:"Another blessing arrived…<br><b>Gaanavi Priya</b> 🌸<br>doubling the laughter, filling every corner with joy"
},
{
year:"2025 👑",
img:"s1.jpeg",
text:"And then came the little king…<br><b>Himansh Kaarthikeya Ram</b> 👑<br>completing their beautiful world ❤️"
}
];

let i=0,t=0;

/* START */
document.getElementById("start").onclick=()=>{
document.getElementById("start").classList.remove("active");
document.getElementById("main").classList.add("active");
showSlide();
};

/* SLIDES */
function showSlide(){
let s=slides[i];
let img=document.getElementById("img");

img.classList.remove("show");

setTimeout(()=>{
img.src="images/"+s.img;
document.getElementById("blur").style.backgroundImage=`url('images/${s.img}')`;

let text=s.text;
if(i>=slides.length-2){
text+="<br><span style='font-size:12px;opacity:0.7'>Ending soon…</span>";
}

document.getElementById("quote").innerHTML=text;
document.getElementById("counter").innerText=(i+1)+" / "+slides.length+" images";

img.classList.add("show");
progress();
},200);

if(i<slides.length-1){
i++;
setTimeout(showSlide,4200);
}else{
setTimeout(()=>document.getElementById("msgBox").classList.add("show"),2000);
}
}

/* PROGRESS */
function progress(){
let b=document.getElementById("progress");
b.style.transition="none";
b.style.width="0%";
setTimeout(()=>{b.style.transition="width 4.2s linear"; b.style.width="100%";},50);
}

/* TIMELINE */
function goTimeline(){
document.getElementById("msgBox").classList.remove("show");
document.getElementById("main").classList.remove("active");
document.getElementById("timeline").classList.add("active");
showYear();
}

function showYear(){
let d=timeline[t];
let img=document.getElementById("tImg");

img.classList.remove("show");

setTimeout(()=>{
img.src="images/"+d.img;
document.getElementById("tBlur").style.backgroundImage=`url('images/${d.img}')`;
document.getElementById("year").innerHTML=`<strong>${d.year}</strong><br><br>${d.text}`;
img.classList.add("show");
},200);
}

function nextYear(){
t++;
if(t<timeline.length) showYear();
else showFinal();
}

/* FINAL */
function showFinal(){
document.getElementById("timeline").classList.remove("active");
document.getElementById("final").classList.add("active");

let msg=[
"10 years… countless memories ❤️",
"From two hearts… to a beautiful family 💖",
"Through every smile, every tear…",
"You built something eternal ✨",
"This is not just love…",
"This is forever ❤️"
];

let i=0;
let el=document.getElementById("finalText");

let inter=setInterval(()=>{
el.innerHTML+=msg[i]+"<br>";
i++;
if(i===msg.length) clearInterval(inter);
},800);
}

</script>

</body>
</html>
