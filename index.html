<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary ❤️</title>

<style>
body{
  margin:0;
  background:black;
  font-family:sans-serif;
  overflow:hidden;
  color:white;
}

.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* screens */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}
.active{display:block;}

/* image layers */
.bg-blur{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(25px) brightness(0.6);
  transform:scale(1.1);
  transition:0.8s;
}

.main-img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  transition:opacity 1s, transform 6s ease;
}

/* cinematic zoom */
.zoom{
  transform:scale(1.08) translateY(-5px);
}

/* overlay */
.overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:12px;
  text-align:center;
  backdrop-filter:blur(6px);
}

/* progress bar */
.progress{
  position:absolute;
  top:0;
  left:0;
  height:4px;
  background:white;
  width:0%;
}

/* hearts */
.heart{
  position:absolute;
  font-size:18px;
  animation:float 6s linear;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* road timeline */
.road{
  position:absolute;
  bottom:40%;
  width:100%;
  height:6px;
  background:white;
}

.car{
  position:absolute;
  bottom:38%;
  font-size:28px;
  transition:left 1.5s ease;
}

/* confetti */
.confetti{
  position:absolute;
  width:6px;
  height:6px;
  background:gold;
  animation:fall 4s linear;
}
@keyframes fall{
  to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="app" onclick="nextSlide()">

<div class="progress" id="progress"></div>

<!-- START -->
<div id="start" class="screen active" style="display:flex;justify-content:center;align-items:center;flex-direction:column;">
  <h1>❤️ Welcome ❤️</h1>
  <p>Tap to Begin</p>
</div>

<!-- MAIN -->
<div id="main" class="screen">
  <div id="blur" class="bg-blur"></div>
  <img id="img" class="main-img">
  <div class="overlay">
    <h2 id="quote"></h2>
  </div>
</div>

<!-- TIMELINE -->
<div id="timeline" class="screen">
  <div class="road"></div>
  <div id="car" class="car">🚗</div>

  <div id="tBlur" class="bg-blur"></div>
  <img id="tImg" class="main-img">

  <div class="overlay">
    <h3 id="year"></h3>
    <p>Tap to continue →</p>
  </div>
</div>

</div>

<script>

/* SLIDES */
const slides = [
  {img:"w1.jpeg", text:"The day everything began ❤️"},
  {img:"w2.jpeg", text:"Two hearts, one promise 💖"},
  {img:"w3.jpeg", text:"A journey of love ✨"},
  {img:"w4.jpeg", text:"Smiles that last forever 😊"},
  {img:"w5.jpeg", text:"Moments turned memories 🌸"},
  {img:"w6.jpeg", text:"Together through everything 🤝"},
  {img:"w7.jpeg", text:"Love growing every day 💞"},
  {img:"w8.jpeg", text:"Still falling in love ❤️"},
  {img:"w9.jpeg", text:"Forever begins again 💫"}
];

/* TIMELINE */
const timeline = [
  {year:"2016 💍", img:"w1.jpeg"},
  {year:"2020 👶", img:"d1.jpeg"},
  {year:"2023 👶", img:"d2.jpeg"},
  {year:"2025 👑", img:"s1.jpeg"}
];

let i=0, mode="start", t=0;

/* TAP */
function nextSlide(){

  if(mode==="start"){
    start();
    return;
  }

  if(mode==="main"){
    i++;
    if(i < slides.length){
      showSlide();
    }else{
      mode="timeline";
      document.getElementById("main").classList.remove("active");
      document.getElementById("timeline").classList.add("active");
      showYear();
    }
  }

  else if(mode==="timeline"){
    t++;
    if(t < timeline.length){
      showYear();
    }else{
      finalScene();
    }
  }
}

/* START */
function start(){
  document.getElementById("start").classList.remove("active");
  document.getElementById("main").classList.add("active");
  mode="main";

  hearts();
  showSlide();
}

/* SLIDE SHOW */
function showSlide(){

  let s = slides[i];
  let src = "images/" + s.img;

  let img = document.getElementById("img");
  let blur = document.getElementById("blur");

  img.style.opacity = 0;

  setTimeout(()=>{
    img.src = src;
    blur.style.backgroundImage = `url('${src}')`;
    document.getElementById("quote").innerText = s.text;

    img.style.opacity = 1;
    img.classList.add("zoom");

    progress();
  },300);

  clearTimeout(window.auto);
  window.auto = setTimeout(nextSlide, 4500);
}

/* PROGRESS */
function progress(){
  let bar = document.getElementById("progress");
  bar.style.transition = "none";
  bar.style.width = "0%";

  setTimeout(()=>{
    bar.style.transition = "width 4.5s linear";
    bar.style.width = "100%";
  },50);
}

/* HEARTS */
function hearts(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },900);
}

/* TIMELINE */
function showYear(){

  let data = timeline[t];
  let src = "images/" + data.img;

  document.getElementById("tImg").src = src;
  document.getElementById("tBlur").style.backgroundImage = `url('${src}')`;
  document.getElementById("year").innerText = data.year;

  document.getElementById("car").style.left = (t*25)+"%";
}

/* FINAL */
function finalScene(){

  document.getElementById("timeline").innerHTML = `
    <div class="bg-blur" style="background-image:url('images/w9.jpeg')"></div>
    <img src="images/w9.jpeg" class="main-img">
    <div class="overlay">
      <h2>❤️ 10 Years of Love ❤️</h2>
      <p>
        A journey filled with memories,<br>
        laughter, and endless love.<br><br>
        Happy Anniversary 💖
      </p>
    </div>
  `;

  /* confetti */
  for(let i=0;i<80;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

</script>

</body>
</html>
