<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preload" as="image" href="images/w1.jpeg">

<style>
body{
  margin:0;
  background:black;
  font-family:sans-serif;
  overflow:hidden;
  color:white;
}

.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  position:relative;
}

/* screens */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}
.active{display:block;}

/* image */
.main-img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transition:opacity 0.8s ease, transform 6s ease;
}
.zoom{transform:scale(1.08);}

/* blur */
.bg-blur{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(25px) brightness(0.6);
  transform:scale(1.1);
}

/* overlay */
.overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* button highlight */
.pulse-btn{
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,0,100,0.7);}
  70%{box-shadow:0 0 0 15px rgba(255,0,100,0);}
  100%{box-shadow:0 0 0 0 rgba(255,0,100,0);}
}

/* progress */
.progress{
  position:absolute;
  top:0;
  height:4px;
  background:white;
  width:0%;
}

/* hearts */
.heart{
  position:absolute;
  animation:float 6s linear;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* balloons */
.balloon{
  position:absolute;
  animation:balloon 10s linear;
}
@keyframes balloon{
  from{transform:translateY(100vh);}
  to{transform:translateY(-20vh);}
}

/* timeline */
.road{
  position:absolute;
  bottom:40%;
  width:100%;
  height:6px;
  background:white;
}
.car{
  position:absolute;
  bottom:37%;
  font-size:28px;
  transition:left 1.8s;
}

/* popup */
#msgBox{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-radius:12px;
  display:none;
}

/* glow */
.glow{
  animation:glow 2.5s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 5px #fff;}
  to{text-shadow:0 0 25px #ff4d6d;}
}
</style>
</head>

<body>

<div class="app">

<div id="progress" class="progress"></div>

<!-- START -->
<div id="start" class="screen active" style="display:flex;justify-content:center;align-items:center;flex-direction:column;">
<h1>❤️ Welcome ❤️</h1>
<p id="loadingText">Tap to Begin</p>
</div>

<!-- MAIN -->
<div id="main" class="screen">
<div id="blur" class="bg-blur"></div>
<img id="img" class="main-img">

<div class="overlay">
<h2 id="quote"></h2>
<button class="pulse-btn" onclick="goTimeline()">Our Journey 🚗</button>
</div>
</div>

<!-- POPUP -->
<div id="msgBox">
<p>💖 Every moment you lived… deserves to be felt again…</p>
</div>

<!-- TIMELINE -->
<div id="timeline" class="screen">
<div class="road"></div>
<div id="car" class="car">🚗</div>

<div id="tBlur" class="bg-blur"></div>
<img id="tImg" class="main-img">

<div class="overlay">
<div id="year"></div>
<button onclick="nextYear()">Next ➡️</button>
</div>
</div>

<!-- FINAL -->
<div id="final" class="screen">
<div class="bg-blur" style="background-image:url('images/w9.jpeg')"></div>
<img src="images/w9.jpeg" class="main-img" style="opacity:1">

<div class="overlay">
<h2 class="glow">❤️ Happy 10th Anniversary ❤️</h2>
<p id="finalText"></p>
</div>
</div>

</div>

<script>

/* preload */
const imgs=["w1.jpeg","w2.jpeg","w3.jpeg","w4.jpeg","w5.jpeg","w6.jpeg","w7.jpeg","w8.jpeg","w9.jpeg","d1.jpeg","d2.jpeg","s1.jpeg"];
function preload(cb){
let c=0;
imgs.forEach(s=>{
let i=new Image();
i.src="images/"+s;
i.onload=()=>{c++; if(c===imgs.length) cb();}
});
}

/* slideshow */
const slides=[
{img:"w1.jpeg",text:"A journey that began with a single promise ❤️"},
{img:"w2.jpeg",text:"Two hearts… choosing each other every day 💖"},
{img:"w3.jpeg",text:"Not perfect… but perfect for each other ✨"},
{img:"w4.jpeg",text:"Smiles, fights, memories… all worth it 😊"},
{img:"w5.jpeg",text:"Growing together, stronger every day 🌸"},
{img:"w6.jpeg",text:"Standing side by side through everything 🤝"},
{img:"w7.jpeg",text:"Love that never faded… only grew 💞"},
{img:"w8.jpeg",text:"Years passed… but hearts stayed the same ❤️"},
{img:"w9.jpeg",text:"And forever still continues… 💫"}
];

/* timeline emotional */
const timeline=[
{
year:"2016 💍",
img:"w1.jpeg",
text:"A promise… to stand together through everything ❤️"
},
{
year:"2020 👶",
img:"d1.jpeg",
text:"Kundana Priya… a dream that came to life 💖<br>bringing endless joy into their world"
},
{
year:"2023 👶",
img:"d2.jpeg",
text:"Gaanavi Priya… another blessing 🌸<br>turning happiness into something even more beautiful"
},
{
year:"2025 👑",
img:"s1.jpeg",
text:"Himansh Kaarthikeya Ram 👑<br>completing their world… a perfect family ❤️"
}
];

let i=0,t=0;

/* start */
document.getElementById("start").onclick=()=>{
document.getElementById("loadingText").innerText="Loading...";
preload(()=>{
document.getElementById("start").remove();
document.getElementById("main").classList.add("active");
hearts(); balloons();
showSlide();
});
};

/* slides */
function showSlide(){
let s=slides[i],src="images/"+s.img;
let img=document.getElementById("img");

img.style.opacity=0;

setTimeout(()=>{
img.src=src;
document.getElementById("blur").style.backgroundImage=`url('${src}')`;
document.getElementById("quote").innerText=s.text;
img.style.opacity=1;
img.classList.add("zoom");
progress();
},200);

i++;
if(i<slides.length) setTimeout(showSlide,4200);
}

/* progress */
function progress(){
let b=document.getElementById("progress");
b.style.width="0%";
setTimeout(()=>{b.style.transition="width 4.2s linear"; b.style.width="100%";},50);
}

/* hearts */
function hearts(){
setInterval(()=>{
if(document.querySelectorAll(".heart").length>15) return;
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},1200);
}

/* balloons */
function balloons(){
setInterval(()=>{
if(document.querySelectorAll(".balloon").length>10) return;
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"%";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},1500);
}

/* timeline with popup */
function goTimeline(){
let msg=document.getElementById("msgBox");
msg.style.display="block";

setTimeout(()=>{
msg.style.display="none";
document.getElementById("main").classList.remove("active");
document.getElementById("timeline").classList.add("active");
t=0; showYear();
},2000);
}

function showYear(){
let d=timeline[t],src="images/"+d.img;
let img=document.getElementById("tImg");

img.style.opacity=0;

setTimeout(()=>{
img.src=src;
document.getElementById("tBlur").style.backgroundImage=`url('${src}')`;
document.getElementById("year").innerHTML=
`<strong>${d.year}</strong><br><br>${d.text}`;
img.style.opacity=1;
},200);

document.getElementById("car").style.left=(t*30)+"%";
}

function nextYear(){
t++;
if(t<timeline.length) showYear();
else showFinal();
}

/* final surprise */
function showFinal(){
document.getElementById("timeline").classList.remove("active");
document.getElementById("final").classList.add("active");

let text="";

const msg=[
"10 years of love… ❤️",
"A journey of two hearts…",
"that became a beautiful family 💖",
"Kundana… Gaanavi… Himansh… 👨‍👩‍👧‍👦",
"This is not just time…",
"This is forever ✨"
];

let i=0;
let el=document.getElementById("finalText");

let interval=setInterval(()=>{
el.innerHTML+=msg[i]+"<br>";
i++;
if(i===msg.length) clearInterval(interval);
},800);
}

</script>

</body>
</html>
