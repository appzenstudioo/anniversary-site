<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary ❤️</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  color:white;
}

.app{
  width:100%;
  max-width:420px;
  height:100vh;
  position:relative;
}

/* screens */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.active{display:flex;}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:gold;
  margin-top:15px;
}

/* background */
.bg{
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* overlay */
.overlay{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:10px;
}

/* fade */
.fade{
  animation:fade 1s;
}
@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active">
  <h1>Welcome ❤️</h1>
  <button onclick="start()">Start</button>
</div>

<!-- MAIN SLIDES -->
<div id="main" class="screen"></div>

<!-- TIMELINE -->
<div id="timeline" class="screen"></div>

</div>

<script>

const startDate = new Date("2016-04-21T00:00:00+05:30");

let timer;
let slideIndex = 0;
let kidIndex = 0;

const slides = ["w1.jpeg","w2.jpeg","w3.jpeg"];
const kids = ["d1.jpeg","d2.jpeg","s1.jpeg"];

/* START */
function start(){
  document.getElementById("start").classList.remove("active");
  document.getElementById("main").classList.add("active");
  showSlides();
}

/* MAIN SLIDESHOW */
function showSlides(){

  const main = document.getElementById("main");

  main.innerHTML = `
    <div class="bg fade" id="bg">
      <div class="overlay">
        <h1>Happy Anniversary 💖</h1>
        <p id="timer"></p>
        <button onclick="openTimeline()">Timeline 👶</button>
      </div>
    </div>
  `;

  document.getElementById("bg").style.backgroundImage =
    "url('images/" + slides[slideIndex] + "')";

  /* timer only on first slide */
  if(slideIndex === 0){
    startTimer();
  }

  slideIndex++;

  if(slideIndex < slides.length){
    setTimeout(showSlides, 4000);
  }
}

/* TIMER */
function startTimer(){
  clearInterval(timer);
  timer = setInterval(()=>{
    let diff = new Date() - startDate;

    let s = Math.floor(diff/1000);
    let m = Math.floor(s/60);
    let h = Math.floor(m/60);
    let d = Math.floor(h/24);
    let w = Math.floor(d/7);
    let mo = Math.floor(d/30);
    let y = Math.floor(d/365);

    document.getElementById("timer").innerHTML =
      `${y} Years | ${mo%12} Months | ${w%4} Weeks<br>
       ${d%7} Days | ${h%24} H | ${m%60} M | ${s%60} S`;
  },1000);
}

/* OPEN TIMELINE */
function openTimeline(){
  document.getElementById("main").classList.remove("active");
  const tl = document.getElementById("timeline");
  tl.classList.add("active");

  tl.innerHTML = `
    <div class="bg fade" id="bg2">
      <div class="overlay">
        <h2>Our Beautiful Family 💖</h2>
        <button onclick="back()">Back</button>
      </div>
    </div>
  `;

  kidIndex = 0;
  showKids();
}

/* KIDS SLIDESHOW */
function showKids(){

  const bg = document.getElementById("bg2");
  if(!bg) return;

  bg.style.backgroundImage =
    "url('images/" + kids[kidIndex] + "')";

  kidIndex++;

  if(kidIndex < kids.length){
    setTimeout(showKids, 3000);
  }
}

/* BACK */
function back(){
  document.getElementById("timeline").classList.remove("active");
  document.getElementById("main").classList.add("active");
}

</script>

</body>
</html>
