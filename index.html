<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  font-family:sans-serif;
  overflow:hidden;
  color:white;
}

.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  position:relative;
}

/* screens */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
}
.active{
  opacity:1;
  pointer-events:auto;
}

/* images */
.main-img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transform:scale(1);
  transition:opacity 1s ease, transform 6s ease;
}
.active-img{
  opacity:1;
  transform:scale(1.05);
}

/* blur */
.bg-blur{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(20px) brightness(0.6);
  transform:scale(1.1);
}

/* overlay */
.overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* button */
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#ff4d6d;
  color:white;
}

/* progress */
.progress{
  position:absolute;
  top:0;
  height:4px;
  background:white;
  width:0%;
}

/* popup */
#msgBox{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  background:rgba(0,0,0,0.9);
  padding:25px;
  border-radius:12px;
  text-align:center;
  opacity:0;
  transition:0.4s;
}
#msgBox.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* glow */
.glow{
  animation:glow 2.5s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 5px #fff;}
  to{text-shadow:0 0 20px #ff4d6d;}
}

/* lightweight effects */
.heart, .balloon{
  position:absolute;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  pointer-events:none;
}

.heart{
  font-size:16px;
  animation:heart 3.5s ease-out forwards;
}
@keyframes heart{
  to{
    transform:translate(calc(-50% + var(--x)), -70vh);
    opacity:0;
  }
}

.balloon{
  font-size:20px;
  animation:balloon 5s ease-out forwards;
}
@keyframes balloon{
  to{
    transform:translate(calc(-50% + var(--x)), -85vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="app">

<div id="progress" class="progress"></div>

<!-- START -->
<div id="start" class="screen active" style="display:flex;justify-content:center;align-items:center;flex-direction:column;">
<h1>❤️ Welcome ❤️</h1>
<p>Tap to Begin</p>
</div>

<!-- MAIN -->
<div id="main" class="screen">
<div id="blur" class="bg-blur"></div>

<img id="img1" class="main-img active-img">
<img id="img2" class="main-img">

<div class="overlay">
<h2 id="quote"></h2>
<div id="counter" style="font-size:12px;opacity:0.7;"></div>
<button onclick="goTimeline()">Our Journey 🚗</button>
</div>
</div>

<!-- POPUP -->
<div id="msgBox">
<p>
✨ This is just the beginning…<br><br>
👉 Tap <b>Our Journey 🚗</b><br>
🎁 Surprise awaits ❤️
</p>
</div>

<!-- TIMELINE -->
<div id="timeline" class="screen">
<div id="tBlur" class="bg-blur"></div>
<img id="tImg" class="main-img">

<div class="overlay">
<div id="year"></div>
<button onclick="nextYear()">Next ➡️</button>
</div>
</div>

<!-- FINAL -->
<div id="final" class="screen">
<div class="bg-blur" style="background-image:url('images/w9.jpeg')"></div>
<img src="images/w9.jpeg" class="main-img active-img">

<div class="overlay">
<h2 class="glow">❤️ Happy 10th Anniversary ❤️</h2>
<p id="finalText"></p>
<button onclick="location.reload()">Replay 🔁</button>
</div>
</div>

</div>

<script>

const slides=[
{img:"w1.jpeg",text:"A journey that began with a promise ❤️"},
{img:"w2.jpeg",text:"Two hearts choosing each other 💖"},
{img:"w3.jpeg",text:"Perfect in their imperfections ✨"},
{img:"w4.jpeg",text:"Memories worth everything 😊"},
{img:"w5.jpeg",text:"Growing stronger together 🌸"},
{img:"w6.jpeg",text:"Standing side by side 🤝"},
{img:"w7.jpeg",text:"Love that never faded 💞"},
{img:"w8.jpeg",text:"Years passed… love stayed ❤️"},
{img:"w9.jpeg",text:"And forever continues 💫"}
];

const timeline=[
{year:"2016 💍",img:"w1.jpeg",text:"The promise of forever ❤️"},
{year:"2020 👶",img:"d1.jpeg",text:"Kundana Priya 💖"},
{year:"2023 👶",img:"d2.jpeg",text:"Gaanavi Priya 🌸"},
{year:"2025 👑",img:"s1.jpeg",text:"Himansh 👑"}
];

let i=0,t=0,currentImg=1;
let heartInterval, balloonInterval;

/* start */
document.getElementById("start").onclick=()=>{
switchScreen("start","main");

heartInterval = hearts();
balloonInterval = balloons();

showSlide();
};

function switchScreen(a,b){
document.getElementById(a).classList.remove("active");
document.getElementById(b).classList.add("active");
}

/* slideshow */
function showSlide(){

let s=slides[i];
let src="images/"+s.img;

let img1=document.getElementById("img1");
let img2=document.getElementById("img2");

let active=currentImg===1?img1:img2;
let next=currentImg===1?img2:img1;

let temp=new Image();
temp.src=src;
temp.onload=()=>{

next.src=src;

setTimeout(()=>{
next.classList.add("active-img");
active.classList.remove("active-img");

document.getElementById("blur").style.backgroundImage=`url('${src}')`;

let text=s.text;
if(i>=slides.length-2){
text+="<br><span style='font-size:12px;opacity:0.6'>Ending soon…</span>";
}

document.getElementById("quote").innerHTML=text;
document.getElementById("counter").innerText=(i+1)+" / "+slides.length;

progress();

},80);

};

currentImg=currentImg===1?2:1;

if(i<slides.length-1){
i++;
setTimeout(showSlide,4000);
}else{
setTimeout(()=>document.getElementById("msgBox").classList.add("show"),1500);
}
}

/* progress */
function progress(){
let b=document.getElementById("progress");
b.style.transition="none";
b.style.width="0%";
setTimeout(()=>{b.style.transition="width 4s linear"; b.style.width="100%";},50);
}

/* optimized hearts */
function hearts(){
return setInterval(()=>{
if(document.querySelectorAll(".heart").length>12) return;

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";

let spread=(Math.random()-0.5)*140;
h.style.setProperty("--x",spread+"px");

document.body.appendChild(h);
setTimeout(()=>h.remove(),3500);

},700);
}

/* optimized balloons */
function balloons(){
return setInterval(()=>{
if(document.querySelectorAll(".balloon").length>8) return;

let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";

let spread=(Math.random()-0.5)*180;
b.style.setProperty("--x",spread+"px");

document.body.appendChild(b);
setTimeout(()=>b.remove(),5000);

},1200);
}

/* timeline */
function goTimeline(){

clearInterval(heartInterval);
clearInterval(balloonInterval);

document.getElementById("msgBox").classList.remove("show");
switchScreen("main","timeline");
showYear();
}

function showYear(){
let d=timeline[t];
let img=document.getElementById("tImg");

img.classList.remove("active-img");

setTimeout(()=>{
img.src="images/"+d.img;
document.getElementById("tBlur").style.backgroundImage=`url('images/${d.img}')`;
document.getElementById("year").innerHTML=`<strong>${d.year}</strong><br><br>${d.text}`;
img.classList.add("active-img");
},200);
}

function nextYear(){
t++;
if(t<timeline.length) showYear();
else showFinal();
}

/* final */
function showFinal(){
switchScreen("timeline","final");

/* small burst only once */
for(let i=0;i<20;i++){
setTimeout(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.setProperty("--x",((Math.random()-0.5)*200)+"px");
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
},i*100);
}

let msg=[
"10 years… countless memories ❤️",
"From two hearts… to a family 💖",
"This is forever ✨"
];

let i=0;
let el=document.getElementById("finalText");

let inter=setInterval(()=>{
el.innerHTML+=msg[i]+"<br>";
i++;
if(i===msg.length) clearInterval(inter);
},800);
}

</script>

</body>
</html>
