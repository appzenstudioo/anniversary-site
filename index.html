<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  font-family:sans-serif;
  overflow:hidden;
  color:white;
}

.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  position:relative;
}

/* screens */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}
.active{display:block;}

/* image */
.main-img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
  transition:opacity 0.8s;
}

/* blur */
.bg-blur{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  filter:blur(25px) brightness(0.6);
}

/* overlay */
.overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* progress */
.progress{
  position:absolute;
  top:0;
  height:4px;
  background:white;
  width:0%;
}

/* ❤️ hearts */
.heart{
  position:absolute;
  animation:float 6s linear;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* 🚗 ROAD */
.road{
  position:absolute;
  bottom:40%;
  width:100%;
  height:6px;
  background:white;
}

.car{
  position:absolute;
  bottom:37%;
  font-size:28px;
  left:0%;
  transition:left 2s ease-in-out; /* 🔥 smooth drive */
}
</style>
</head>

<body>

<div class="app">

<div id="progress" class="progress"></div>

<!-- START -->
<div id="start" class="screen active" style="display:flex;justify-content:center;align-items:center;flex-direction:column;">
  <h1>❤️ Welcome ❤️</h1>
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="main" class="screen">
  <div id="blur" class="bg-blur"></div>
  <img id="img" class="main-img">

  <div class="overlay">
    <h2 id="quote"></h2>
    <button onclick="goTimeline()">Timeline 🚗</button>
  </div>
</div>

<!-- TIMELINE -->
<div id="timeline" class="screen">

  <div class="road"></div>
  <div id="car" class="car">🚗</div>

  <div id="tBlur" class="bg-blur"></div>
  <img id="tImg" class="main-img">

  <div class="overlay">
    <h3 id="year"></h3>
    <button onclick="nextYear()">Next ➡️</button>
  </div>

</div>

</div>

<script>

/* SLIDES */
const slides = [
  {img:"w1.jpeg", text:"The day everything began ❤️"},
  {img:"w2.jpeg", text:"Two hearts, one journey 💖"},
  {img:"w3.jpeg", text:"Love growing stronger 🌸"},
  {img:"w4.jpeg", text:"Memories forever ✨"},
  {img:"w5.jpeg", text:"Moments of happiness 💞"},
  {img:"w6.jpeg", text:"Together through everything 🤝"},
  {img:"w7.jpeg", text:"Still smiling together 😊"},
  {img:"w8.jpeg", text:"Still in love ❤️"},
  {img:"w9.jpeg", text:"Forever begins again 💫"}
];

/* TIMELINE */
const timeline = [
  {year:"2016 💍", img:"w1.jpeg"},
  {year:"2020 👶", img:"d1.jpeg"},
  {year:"2023 👶", img:"d2.jpeg"},
  {year:"2025 👑", img:"s1.jpeg"}
];

let i=0, t=0;

/* START */
function start(){
  document.getElementById("start").classList.remove("active");
  document.getElementById("main").classList.add("active");

  hearts();
  showSlide();
}

/* SLIDES */
function showSlide(){

  let s = slides[i];
  let src = "images/" + s.img;

  document.getElementById("img").src = src;
  document.getElementById("blur").style.backgroundImage = `url('${src}')`;
  document.getElementById("quote").innerText = s.text;

  progress();

  i++;

  if(i < slides.length){
    setTimeout(showSlide, 4000);
  }
}

/* PROGRESS */
function progress(){
  let bar = document.getElementById("progress");
  bar.style.width = "0%";

  setTimeout(()=>{
    bar.style.transition="width 4s linear";
    bar.style.width="100%";
  },50);
}

/* ❤️ HEARTS */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },800);
}

/* GO TIMELINE */
function goTimeline(){
  document.getElementById("main").classList.remove("active");
  document.getElementById("timeline").classList.add("active");

  t=0;
  showYear();
}

/* SHOW YEAR */
function showYear(){

  let data = timeline[t];
  let src = "images/" + data.img;

  document.getElementById("tImg").src = src;
  document.getElementById("tBlur").style.backgroundImage = `url('${src}')`;
  document.getElementById("year").innerText = data.year;

  /* 🚗 SMOOTH CAR DRIVE */
  document.getElementById("car").style.left = (t * 30) + "%";
}

/* NEXT */
function nextYear(){
  t++;
  if(t < timeline.length){
    showYear();
  }
}

</script>

</body>
</html>
